# NeoRevived CI — validate frontmatter and build the static site.
# Hosting is handled by GitHub Actions (gh-pages) on the GitHub mirror.
stages:
  - validate
  - build

variables:
  NODE_VERSION: "20"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

# Manual only — validate frontmatter.
validate:
  stage: validate
  image: node:${NODE_VERSION}
  script:
    - npm ci
    - npm run validate
  when: manual

# Builds the static site into public/.
build:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - public
    expire_in: 1 day
  when: manual
